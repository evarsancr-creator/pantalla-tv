<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla Corporativa - CCSS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Fondo moderno con gradiente institucional en movimiento */
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #021B3A 0%, #063970 50%, #021B3A 100%);
            background-size: 400% 400%;
            animation: gradientMovement 15s ease infinite;
        }

        @keyframes gradientMovement {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .pantalla-completa {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            padding: 20px; /* Margen para efecto flotante */
            gap: 15px;
        }

        /* MARCO SUPERIOR: Efecto Vidrio Esmerilado (Glassmorphism) */
        .marco-superior {
            width: 100%;
            height: 15vh;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Contenedor del Logo */
        .contenedor-logo {
            height: 75%;
            display: flex;
            align-items: center;
        }
        
        .logo-ccss {
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0px 0px 8px rgba(255, 255, 255, 0.2));
        }

        /* Texto Institucional de la Dirección */
        .texto-direccion {
            color: #ffffff;
            font-size: 2vw;
            font-weight: 700;
            text-align: center;
            flex-grow: 1;
            padding: 0 20px;
            letter-spacing: 0.8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            text-transform: uppercase;
        }

        /* Bloque de Tiempo (Reloj + Fecha) */
        .tiempo-contenedor {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            min-width: 220px;
        }

        /* Nuevo Color del Reloj (Blanco/Azul Glacial) */
        .reloj {
            color: #e0f2fe; 
            font-size: 2.4vw;
            font-weight: 700;
            font-family: monospace;
            text-shadow: 0 0 10px rgba(224, 242, 254, 0.5);
            line-height: 1;
            margin-bottom: 4px;
        }

        /* Componente de Fecha */
        .fecha {
            color: #93c5fd; /* Azul claro suave para la fecha */
            font-size: 1.1vw;
            font-weight: 500;
            text-transform: capitalize; /* Pone en mayúscula la primera letra */
            letter-spacing: 0.5px;
        }

        /* CONTENEDOR MULTIMEDIA CON FONDO ADAPTATIVO */
        .slideshow-container { 
            width: 100%;
            height: 79vh;
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background-color: #121212; /* Gris oscuro elegante para las franjas de 'contain' */
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        
        /* Imágenes configuradas en CONTAIN */
        img.slide { 
            position: absolute;
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* Ajusta sin deformar ni recortar */
            opacity: 0; 
            transform: scale(0.98);
            transition: opacity 1.2s ease-in-out, transform 1.2s ease-in-out; 
        }
        
        img.slide.active { 
            opacity: 1; 
            transform: scale(1);
        }
    </style>
</head>
<body>

<div class="pantalla-completa">

    <!-- MARCO CORPORATIVO UPGRADE -->
    <header class="marco-superior">
        <div class="contenedor-logo">
            <img class="logo-ccss" src="logo-ccss.png" alt="Logo CCSS">
        </div>
        <h1 class="texto-direccion">Dirección de Aprovisionamiento de Bienes y Servicios</h1>
        
        <!-- Bloque de fecha y hora en vivo -->
        <div class="tiempo-contenedor">
            <div class="reloj" id="reloj">00:00:00</div>
            <div class="fecha" id="fecha">Cargando fecha...</div>
        </div>
    </header>

    <!-- COMPONENTE DE IMÁGENES -->
    <main class="slideshow-container">
        <img class="slide active" src="foto1.jpg">
        <img class="slide" src="foto2.jpg">
        <img class="slide" src="foto3.jpg">
        <img class="slide" src="foto4.jpg">
        <img class="slide" src="foto5.jpg">
        <img class="slide" src="foto6.jpg">
    </main>

</div>

<script>
    // 1. CONTROL DEL SLIDESHOW
    let currentIndex = 0;
    const slides = document.querySelectorAll('.slide');
    const tiempoCambioImagen = 8000; // 6 segundos por foto

    function changeSlide() {
        if (slides.length > 1) {
            slides[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % slides.length;
            slides[currentIndex].classList.add('active');
        }
    }
    setInterval(changeSlide, tiempoCambioImagen);

    // 2. FUNCIÓN DE RELOJ Y FECHA EN VIVO
    function actualizarTiempo() {
        const ahora = new Date();
        
        // Formato del Reloj
        let horas = ahora.getHours().toString().padStart(2, '0');
        let minutos = ahora.getMinutes().toString().padStart(2, '0');
        let segundos = ahora.getSeconds().toString().padStart(2, '0');
        document.getElementById('reloj').textContent = `${horas}:${minutos}:${segundos}`;
        
        // Formato de la Fecha en Español (Ejemplo: lunes, 24 de agosto)
        const opciones = { weekday: 'long', day: 'numeric', month: 'long' };
        let fechaTexto = ahora.toLocaleDateString('es-ES', opciones);
        document.getElementById('fecha').textContent = fechaTexto;
    }
    setInterval(actualizarTiempo, 1000);
    actualizarTiempo(); // Carga inmediata

    // 3. AUTOREFRESCO DE PRODUCCIÓN (Cada 1 hora)
    setTimeout(function() { 
        location.reload(); 
    }, 60000); 
</script>

</body>
</html>
