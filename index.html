<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla Corporativa - CCSS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Fondo moderno con gradiente institucional y animación sutil */
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            font-family: 'Montserrat', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #021B3A 0%, #063970 50%, #021B3A 100%);
            background-size: 400% 400%;
            animation: gradientMovement 15s ease infinite;
        }

        @keyframes gradientMovement {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .pantalla-completa {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            padding: 25px; /* Margen externo para que todo flote de forma elegante */
            gap: 20px;
        }

        /* MARCO SUPERIOR: Efecto Vidrio Esmerilado (Glassmorphism) */
        .marco-superior {
            width: 100%;
            height: 14vh;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Contenedor del Logo con brillo suave trasero */
        .contenedor-logo {
            height: 75%;
            display: flex;
            align-items: center;
            position: relative;
        }
        
        .logo-ccss {
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0px 0px 8px rgba(255, 255, 255, 0.2));
        }

        /* Texto Institucional Estilizado */
        .texto-direccion {
            color: #ffffff;
            font-size: 2.1vw;
            font-weight: 700;
            text-align: center;
            flex-grow: 1;
            letter-spacing: 0.8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            text-transform: uppercase;
        }

        /* Reloj Digital Moderno */
        .reloj-contenedor {
            color: #00e5ff; /* Color cian tecnológico neón */
            font-size: 2.2vw;
            font-weight: 600;
            font-family: monospace;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
            min-width: 150px;
            text-align: right;
        }

        /* CONTENEDOR DE FILMINAS ESTILO TARJETA FLOTANTE */
        .slideshow-container { 
            width: 100%;
            height: 80vh;
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        
        /* Imágenes de la presentación con bordes suavizados internos */
        img.slide { 
            position: absolute;
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* Cambia a 'contain' si prefieres que se vea la foto completa sin recortar bordes */
            opacity: 0; 
            transform: scale(0.98);
            transition: opacity 1.2s ease-in-out, transform 1.2s ease-in-out; 
        }
        
        img.slide.active { 
            opacity: 1; 
            transform: scale(1);
        }
    </style>
</head>
<body>

<div class="pantalla-completa">

    <!-- MARCO CORPORATIVO MODERNIZADO -->
    <header class="marco-superior">
        <div class="contenedor-logo">
            <img class="logo-ccss" src="logo-ccss.png" alt="Logo CCSS">
        </div>
        <h1 class="texto-direccion">Dirección de Aprovisionamiento de Bienes y Servicios</h1>
        <!-- Reloj digital en vivo -->
        <div class="reloj-contenedor" id="reloj">00:00:00</div>
    </header>

    <!-- COMPONENTE DE IMÁGENES FLOTANTES -->
    <main class="slideshow-container">
        <img class="slide active" src="foto1.jpg">
        <img class="slide" src="foto2.jpg">
        <img class="slide" src="foto3.jpg">
        <img class="slide" src="foto4.jpg">
        <img class="slide" src="foto5.jpg">
        <img class="slide" src="foto6.jpg">
    </main>

</div>

<script>
    // 1. CONTROL DEL SLIDESHOW
    let currentIndex = 0;
    const slides = document.querySelectorAll('.slide');
    const tiempoCambioImagen = 8000; // Cambia cada 6 segundos para dar tiempo al efecto

    function changeSlide() {
        if (slides.length > 1) {
            slides[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % slides.length;
            slides[currentIndex].classList.add('active');
        }
    }
    setInterval(changeSlide, tiempoCambioImagen);

    // 2. FUNCIÓN DEL RELOJ DIGITAL EN VIVO
    function actualizarReloj() {
        const ahora = new Date();
        let horas = ahora.getHours().toString().padStart(2, '0');
        let minutos = ahora.getMinutes().toString().padStart(2, '0');
        let segundos = ahora.getSeconds().toString().padStart(2, '0');
        document.getElementById('reloj').textContent = `${horas}:${minutos}:${segundos}`;
    }
    setInterval(actualizarReloj, 1000);
    actualizarReloj(); // Ejecución inmediata al cargar

    // 3. AUTOREFRESCO DE PRODUCCIÓN (Cada 1 hora)
    setTimeout(function() { 
        location.reload(); 
    }, 60000); 
</script>

</body>
</html>
