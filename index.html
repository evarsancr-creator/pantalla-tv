html<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla DABS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: black; }
        
        /* Contenedor que obliga a usar el 100% de la televisión */
        .slideshow-container { 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        img { 
            position: absolute;
            /* Forza a la imagen pequeña a medir el 100% de la pantalla */
            width: 100%; 
            height: 100%; 
            
            /* OPCIÓN A: Cambia a 'cover' si prefieres que mantenga la proporción 
               pero recorte un poco arriba/abajo para no dejar franjas negras.
               OPCIÓN B: 'fill' estira la imagen exacta al tamaño de la TV. */
            object-fit: fill; 
            
            opacity: 0; 
            transition: opacity 1s ease-in-out; 
        }
        
        img.active { 
            opacity: 1; 
        }
    </style>
</head>
<body>

<div class="slideshow-container">
    <img class="slide active" src="foto1.jpg">
    <img class="slide" src="foto2.jpg">
    <img class="slide" src="foto3.jpg">
    <img class="slide" src="foto4.jpg">
    <img class="slide" src="foto5.jpg">
    <img class="slide" src="foto6.jpg">
</div>

<script>
    let currentIndex = 0;
    const slides = document.querySelectorAll('.slide');
    const tiempoCambioImagen = 8000; // Cambia cada 5 segundos

    function changeSlide() {
        slides[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + 1) % slides.length;
        slides[currentIndex].classList.add('active');
    }
    setInterval(changeSlide, tiempoCambioImagen);

    // CONFIGURACIÓN FINAL: Refresco automático cada 1 hora (3600000 ms)
    setTimeout(function() { 
        location.reload(); 
    }, 60000); 
</script>

</body>
</html>
