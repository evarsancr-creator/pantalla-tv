html<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DABS1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Contenedor principal de la pantalla */
        .pantalla-completa {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }

        /* BARRA SUPERIOR INSTITUCIONAL */
        .marco-superior {
            width: 100%;
            height: 15vh; /* Ocupa el 15% superior de la pantalla */
            background-color: #ffffff; /* Fondo blanco limpio */
            border-bottom: 5px solid #0056b3; /* Línea azul oficial CCSS */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 3%;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        /* Contenedor del Logo Local */
        .logo-ccss {
            height: 80%; /* Ajusta el logo al tamaño de la barra */
            object-fit: contain;
        }

        /* Texto Institucional de la Dirección */
        .texto-direccion {
            color: #003366; /* Azul marino corporativo */
            font-size: 2.3vw; /* Ajuste dinámico según el tamaño del televisor */
            font-weight: bold;
            text-align: right;
            flex-grow: 1;
            padding-left: 20px;
            letter-spacing: 0.5px;
        }

        /* ESPACIO PARA EL CONTENIDO MULTIMEDIA */
        .slideshow-container { 
            width: 100%;
            height: 85vh; /* Ocupa el 85% restante de la pantalla */
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background-color: #0d0d0d;
        }
        
        /* Imágenes de la presentación */
        img.slide { 
            position: absolute;
            width: 100%; 
            height: 100%; 
            object-fit: fill; 
            opacity: 0; 
            transition: opacity 1s ease-in-out; 
        }
        
        img.slide.active { 
            opacity: 1; 
        }
    </style>
</head>
<body>

<div class="pantalla-completa">

    <!-- MARCO CORPORATIVO CCSS -->
    <header class="marco-superior">
        <!-- AHORA CARGA DESDE TU PROPIO REPOSITORIO -->
        <img class="logo-ccss" src="logo-ccss.png" alt="Logo CCSS">
        <h1 class="texto-direccion">Dirección de Aprovisionamiento de Bienes y Servicios</h1>
    </header>

    <!-- VISUALIZADOR DE IMÁGENES -->
    <main class="slideshow-container">
        <!-- Reemplaza con los nombres exactos de tus fotos semanales -->
        <img class="slide active" src="foto1.jpg">
        <img class="slide" src="foto2.jpg">
        <img class="slide" src="foto3.jpg">
        <img class="slide" src="foto4.jpg">
        <img class="slide" src="foto5.jpg">
        <img class="slide" src="foto6.jpg">
    </main>

</div>

<script>
    let currentIndex = 0;
    const slides = document.querySelectorAll('.slide');
    const tiempoCambioImagen = 8000; // Cambia cada 5 segundos

    function changeSlide() {
        if (slides.length > 1) {
            slides[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % slides.length;
            slides[currentIndex].classList.add('active');
        }
    }
    setInterval(changeSlide, tiempoCambioImagen);

    // CONFIGURACIÓN DE PRODUCCIÓN: Autorefresco cada 1 hora (3600000 ms)
    setTimeout(function() { 
        location.reload(); 
    }, 60000); 
</script>

</body>
</html>
