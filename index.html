<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla Corporativa Inteligente - CCSS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Fondo base de seguridad */
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
        }
        
        .pantalla-completa {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            padding: 20px;
            gap: 15px;
            position: relative;
            z-index: 5;
        }

        /* MARCO SUPERIOR MODERNIZADO (Cristal Translúcido) */
        .marco-superior {
            width: 100%;
            height: 15vh;
            background: rgba(13, 17, 23, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .contenedor-logo {
            height: 75%;
            display: flex;
            align-items: center;
        }
        
        .logo-ccss {
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0px 0px 8px rgba(255, 255, 255, 0.15));
        }

        .texto-direccion {
            color: #ffffff;
            font-size: 2vw;
            font-weight: 700;
            text-align: center;
            flex-grow: 1;
            padding: 0 20px;
            letter-spacing: 0.8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            text-transform: uppercase;
        }

        .tiempo-contenedor {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            min-width: 220px;
        }

        .reloj {
            color: #e0f2fe; 
            font-size: 2.4vw;
            font-weight: 700;
            font-family: monospace;
            text-shadow: 0 0 10px rgba(224, 242, 254, 0.4);
            line-height: 1;
            margin-bottom: 4px;
        }

        .fecha {
            color: #93c5fd; 
            font-size: 1.1vw;
            font-weight: 500;
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        /* CONTENEDOR MULTIMEDIA PRINCIPAL */
        .slideshow-container { 
            width: 100%;
            height: 79vh;
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }
        
        /* Imágenes principales en primer plano (Respetan su forma) */
        img.slide { 
            position: absolute;
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            opacity: 0; 
            z-index: 2;
            transform: scale(0.97);
            transition: opacity 1.2s ease-in-out, transform 1.2s ease-in-out; 
        }
        
        img.slide.active { 
            opacity: 1; 
            transform: scale(1);
        }

        /* CAPA DE FONDO ADAPTATIVO (La magia del color) */
        .background-ambientes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            overflow: hidden;
        }

        img.slide-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Se estira para rellenar todo el fondo */
            opacity: 0;
            /* Filtro masivo para mezclar los colores predominantes en una nube suave */
            filter: blur(60px) brightness(0.4) saturate(1.4); 
            transition: opacity 1.2s ease-in-out;
        }

        img.slide-bg.active {
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- CAPA MÁGICA: Colores dinámicos difuminados al fondo de toda la pantalla -->
    <div class="background-ambientes">
        <img class="slide-bg active" src="foto1.jpg">
        <img class="slide-bg" src="foto2.jpg">
        <img class="slide-bg" src="foto3.jpg">
        <img class="slide-bg" src="foto4.jpg">
        <img class="slide-bg" src="foto5.jpg">
        <img class="slide-bg" src="foto6.jpg">
    </div>

    <div class="pantalla-completa">

        <!-- MARCO CORPORATIVO -->
        <header class="marco-superior">
            <div class="contenedor-logo">
                <img class="logo-ccss" src="logo-ccss.png" alt="Logo CCSS">
            </div>
            <h1 class="texto-direccion">Dirección de Aprovisionamiento de Bienes y Servicios</h1>
            
            <div class="tiempo-contenedor">
                <div class="reloj" id="reloj">00:00:00</div>
                <div class="fecha" id="fecha">Cargando...</div>
            </div>
        </header>

        <!-- IMÁGENES NÍTIDAS EN PRIMER PLANO -->
        <main class="slideshow-container">
            <img class="slide active" src="foto1.jpg">
            <img class="slide" src="foto2.jpg">
            <img class="slide" src="foto3.jpg">
            <img class="slide" src="foto4.jpg">
            <img class="slide" src="foto5.jpg">
            <img class="slide" src="foto6.jpg">
        </main>

    </div>

<script>
    // 1. SINCRONIZACIÓN DE SLIDESHOW (Imagen nítida + Fondo de color coordinado)
    let currentIndex = 0;
    const slides = document.querySelectorAll('.slide');
    const backgroundSlides = document.querySelectorAll('.slide-bg');
    const tiempoCambioImagen = 8000; // 6 segundos

    function changeSlide() {
        if (slides.length > 1) {
            // Quitar clase activa a lo viejo
            slides[currentIndex].classList.remove('active');
            backgroundSlides[currentIndex].classList.remove('active');
            
            // Calcular siguiente índice
            currentIndex = (currentIndex + 1) % slides.length;
            
            // Añadir clase activa a lo nuevo (cambian al mismo tiempo)
            slides[currentIndex].classList.add('active');
            backgroundSlides[currentIndex].classList.add('active');
        }
    }
    setInterval(changeSlide, tiempoCambioImagen);

    // 2. RELOJ Y FECHA EN VIVO
    function actualizarTiempo() {
        const ahora = new Date();
        let horas = ahora.getHours().toString().padStart(2, '0');
        let minutos = caffeine = ahora.getMinutes().toString().padStart(2, '0');
        let segundos = ahora.getSeconds().toString().padStart(2, '0');
        document.getElementById('reloj').textContent = `${horas}:${minutos}:${segundos}`;
        
        const opciones = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('fecha').textContent = ahora.toLocaleDateString('es-ES', opciones);
    }
    setInterval(actualizarTiempo, 1000);
    actualizarTiempo();

    // 3. REFRESCO SEMANAL AUTOMÁTICO (Cada 1 hora)
    setTimeout(function() { 
        location.reload(); 
    }, 60000); 
</script>

</body>
</html>
