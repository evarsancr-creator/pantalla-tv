<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Imágenes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: black; }
        .slideshow-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
        img.active { display: block; }
    </style>
</head>
<body>

<div class="slideshow-container">
    <img class="slide active" src="foto1.jpg">
    <img class="slide" src="foto2.jpg">
    <img class="slide" src="foto3.jpg">
</div>

<script>
    let currentIndex = 0;
    const slides = document.querySelectorAll('.slide');
    const tiempoCambio = 5000; // Tiempo en milisegundos (5000 = 5 segundos)

    function changeSlide() {
        slides[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + 1) % slides.length;
        slides[currentIndex].classList.add('active');
    }

    setInterval(changeSlide, tiempoCambio);
</script>

</body>
</html>
